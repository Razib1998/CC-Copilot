<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <title>CC Cockpit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#1a56db" />
  <meta name="cc-api-base" content="https://api.cc-werbung-data.de" />
  <link rel="icon" href="/icons/favicon.ico" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.json" />
  <script type="module" crossorigin src="/assets/index-Bp_L2w6R.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/cc-auth-session-CFAgPnG7.js">
  <link rel="stylesheet" crossorigin href="/assets/index-BkyJEkqV.css">
</head>
<body>
  <div id="cockpit-root" class="ckp-shell-layout" data-app-module="cockpit">
    <div
      class="ckp-topbar ckp-topbar-modules ccds-top-tabs"
      data-ccw-ro="topbar"
      aria-label="Module"
    >
      <button type="button" data-module="cockpit" class="ccds-top-tab ckp-mod-btn mod--cockpit active" aria-current="true">
        <span class="ccds-t-icon-box" aria-hidden="true">⊞</span>
        Cockpit
      </button>
      <button type="button" data-module="fusa" class="ccds-top-tab ckp-mod-btn mod--fusa">
        <span class="ccds-t-icon-box" aria-hidden="true">📋</span>
        FUSA
      </button>
      <button type="button" data-module="ccintern" class="ccds-top-tab ckp-mod-btn mod--ccintern">
        <span class="ccds-t-icon-box" aria-hidden="true">🏭</span>
        CC Intern
      </button>
      <button
        type="button"
        id="ccw-logout-btn"
        class="ccds-top-tab"
        style="margin-left:auto;"
        hidden
      >
        Abmelden
      </button>
    </div>
    <div class="cockpit-body ckp-shell-body">
      <nav id="cockpit-sidebar" class="cockpit-sidebar cockpit-sidebar--styl-c" aria-label="Hauptnavigation"></nav>
      <main id="cockpit-main" class="cockpit-main--styl-c">
        <div id="cockpit-content" data-ccw-region="app-main" aria-live="polite"></div>
      </main>
    </div>
  </div>
</body>
</html>
